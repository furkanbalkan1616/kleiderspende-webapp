<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kleiderspende registrieren</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="bg-dark text-white p-3">
  <div class="container d-flex justify-content-between align-items-center">

    <!-- ✅ FIX: Logo + Titel klickbar -->
    <a href="index.html"
       class="d-flex align-items-center text-white text-decoration-none">
      <h1 class="fs-4 m-0">Kleiderspenden Portal</h1>
    </a>

    <nav>
      <a href="index.html" class="text-white me-3">Start</a>
      <a href="registrierung.html" class="text-white fw-bold">Registrierung</a>
    </nav>
  </div>
</header>

<main class="container mt-5">
  <h2>Kleiderspende registrieren</h2>

  <!-- ✅ FIX: novalidate -->
  <form id="spendenForm" novalidate>

    <div id="fehlermeldung" class="alert alert-danger d-none fw-bold"></div>

    <!-- Übergabe -->
    <div class="mb-3">
      <label class="form-label">Übergabeart</label>

      <div class="form-check">
        <input type="radio" name="uebergabe" id="geschaeftsstelle" checked>
        <label for="geschaeftsstelle">Übergabe an der Geschäftsstelle</label>
      </div>

      <div class="form-check">
        <input type="radio" name="uebergabe" id="abholung">
        <label for="abholung">Abholung (Sammelfahrzeug)</label>
      </div>
    </div>

    <!-- Adresse -->
    <div id="adresseBereich" class="mb-3 d-none">
      <label for="strasse">Straße & Hausnummer</label>
      <input type="text" id="strasse" class="form-control mb-2" placeholder="z. B. Musterstraße 12">

      <label for="plz">Postleitzahl</label>
      <input type="text" id="plz" class="form-control mb-2" placeholder="z. B. 70173">

      <label for="ort">Ort</label>
      <input type="text" id="ort" class="form-control" placeholder="z. B. Stuttgart">
    </div>

    <!-- Kleidung -->
    <label for="kleidung">Art der Kleidung</label>
    <select id="kleidung" class="form-select mb-3" required>
      <option value="">Bitte auswählen...</option>
      <option>Jacken</option>
      <option>Hosen</option>
      <option>T-Shirts</option>
      <option>Schuhe</option>
      <option>Kinderkleidung</option>
    </select>

    <!-- Krisengebiet -->
    <label for="krisengebiet">Krisengebiet</label>
    <select id="krisengebiet" class="form-select mb-3" required>
      <option value="">Bitte auswählen...</option>
      <option>Ukraine</option>
      <option>Syrien</option>
      <option>Türkei</option>
      <option>Afrika</option>
      <option>Sudan</option>
    </select>

    <!-- ✅ FIX: type="submit" -->
    <button type="submit" class="btn btn-primary">
      Registrierung abschließen
    </button>

  </form>
</main>

<footer class="text-center mt-5 p-3 bg-light">
  <a href="impressum.html">Impressum</a> |
  <a href="datenschutz.html">Datenschutz</a>
  <p class="small text-muted mt-2">© 2026 Kleiderspenden Verein</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
