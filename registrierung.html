<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kleiderspende registrieren</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="bg-dark text-white">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center p-3">

    <a href="index.html" class="d-flex align-items-center text-white text-decoration-none mb-2 mb-md-0">
      <img src="img/logo.png" width="50" class="me-2" alt="Logo">
      <h1 class="h4 m-0">Kleiderspenden Portal</h1>
    </a>

    <nav class="d-flex gap-3">
      <a href="index.html" class="text-white">Start</a>
      <a href="registrierung.html" class="text-white fw-bold text-decoration-underline">Registrierung</a>
    </nav>

  </div>
</header>

<main class="container mt-5 mb-5">

  <div class="page-intro mb-4 text-center text-md-start">
    <h2>Kleiderspende registrieren</h2>
    <p class="text-muted">
      Erfassen Sie Ihre Spende in wenigen Schritten.
    </p>
  </div>

  <div class="card p-4">

    <form id="spendenForm" novalidate>

      <div id="fehlermeldung" class="alert alert-danger" style="display:none;"></div>

      <!-- ÜBERGABE -->
      <div class="address-box mb-3">
        <label class="form-label">
          <i class="bi bi-truck"></i> Übergabeart *
        </label>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="uebergabe" id="geschaeftsstelle" value="Geschaeftsstelle" checked>
          <label class="form-check-label">
            Übergabe an der Geschäftsstelle
          </label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="uebergabe" id="abholung" value="Abholung">
          <label class="form-check-label">
            Abholung (Sammelfahrzeug)
          </label>
        </div>
      </div>

      <!-- ADRESSE -->
      <div id="adresseBereich" class="address-box mb-3" style="display:none">

        <label class="form-label" for="strasse">Straße & Hausnummer</label>
        <input type="text" class="form-control mb-2" id="strasse" placeholder="z. B. Musterstraße 12">

        <label class="form-label" for="plz">Postleitzahl</label>
        <input type="text" class="form-control mb-2" id="plz" placeholder="z. B. 76xxx">

        <small class="text-muted">
          Abholung nur im Einzugsgebiet (PLZ muss mit 76 beginnen).
        </small>

        <label class="form-label mt-2" for="ort">Ort</label>
        <input type="text" class="form-control" id="ort" placeholder="z. B. Karlsruhe">

      </div>

      <!-- KLEIDUNG -->
      <div class="mb-3">
        <label class="form-label" for="kleidung">
          <i class="bi bi-bag-heart"></i> Art der Kleidung *
        </label>
        <select class="form-select" id="kleidung" required>
          <option value="">Bitte auswählen</option>
          <option>Jacken</option>
          <option>Hosen</option>
          <option>T-Shirts</option>
          <option>Schuhe</option>
          <option>Kinderkleidung</option>
          <option>Decken / Schlafsäcke</option>
        </select>
      </div>

      <!-- KRISENGEBIET -->
      <div class="mb-3">
        <label class="form-label" for="krisengebiet">
          <i class="bi bi-globe"></i> Krisengebiet *
        </label>
        <select class="form-select" id="krisengebiet" required>
          <option value="">Bitte auswählen</option>
          <option>Ukraine</option>
          <option>Syrien</option>
          <option>Türkei</option>
          <option>Afrika</option>
          <option>Sudan</option>
        </select>
      </div>

      <!-- BUTTON -->
      <div class="d-flex flex-column flex-md-row gap-2 mt-4">
        <button class="btn btn-primary w-100" type="submit">
          Registrierung abschließen
        </button>
        <a href="index.html" class="btn btn-outline-primary w-100">
          Zurück
        </a>
      </div>

    </form>

  </div>

</main>

<footer class="text-center p-4 mt-5">
  <a href="impressum.html">Impressum</a> |
  <a href="datenschutz.html">Datenschutz</a>
  <p class="mt-2">© 2026 Kleiderspenden Verein</p>
</footer>

<script src="js/app.js"></script>

</body>
</html>
