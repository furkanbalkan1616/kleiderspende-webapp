<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kleiderspende registrieren</title>

  <meta name="description" content="Kleiderspende einfach registrieren und Menschen helfen.">

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="bg-dark text-white">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center p-3">

    <a href="index.html"
       class="d-flex align-items-center text-white text-decoration-none">
      <img src="img/logo.png"
           alt="Logo Kleiderspenden Portal"
           width="50"
           class="me-2">
      <h1 class="m-0 fs-4">Kleiderspenden Portal</h1>
    </a>

    <nav>
      <a href="index.html" class="text-white me-3">Start</a>
      <a href="registrierung.html"
         class="text-white fw-bold"
         aria-current="page">
         Registrierung
      </a>
    </nav>

  </div>
</header>

<main class="container mt-5">
  <h2 class="mb-4">Kleiderspende registrieren</h2>

  <form id="spendenForm" novalidate autocomplete="on">

    <!-- 🔥 Fehlermeldung (ACCESSIBILITY FIX) -->
    <div id="fehlermeldung"
         class="alert alert-danger d-none fw-bold"
         role="alert"
         aria-live="assertive"></div>

    <!-- 🔥 Übergabe -->
    <fieldset class="mb-4 fade-in">
      <legend class="form-label fw-semibold">Übergabeart</legend>

      <div class="form-check">
        <input type="radio"
               name="uebergabe"
               id="geschaeftsstelle"
               value="Geschaeftsstelle"
               checked>
        <label for="geschaeftsstelle">Übergabe an der Geschäftsstelle</label>
      </div>

      <div class="form-check">
        <input type="radio"
               name="uebergabe"
               id="abholung"
               value="Abholung">
        <label for="abholung">Abholung (Sammelfahrzeug)</label>
      </div>
    </fieldset>

    <!-- 🔥 Adresse -->
    <div id="adresseBereich" class="mb-4 d-none fade-in">

      <p class="text-muted small">
        Hinweis: Die Adresse ist nur erforderlich, wenn Sie „Abholung“ auswählen.
      </p>

      <label for="strasse">Straße & Hausnummer</label>
      <input type="text"
             id="strasse"
             class="form-control mb-2"
             placeholder="z. B. Musterstraße 12"
             autocomplete="street-address">

      <label for="plz">Postleitzahl</label>
      <input type="text"
             id="plz"
             class="form-control mb-2"
             placeholder="z. B. 76133"
             inputmode="numeric"
             pattern="\d{5}"
             aria-describedby="plzHelp"
             autocomplete="postal-code">

      <div id="plzHelp" class="form-text">
        Bitte geben Sie eine 5-stellige Postleitzahl ein.
      </div>

      <label for="ort">Ort</label>
      <input type="text"
             id="ort"
             class="form-control"
             placeholder="z. B. Karlsruhe"
             autocomplete="address-level2">
    </div>

    <!-- 🔥 Kleidung -->
    <div class="fade-in">
      <label for="kleidung">Art der Kleidung</label>
      <select id="kleidung" class="form-select mb-3" required>
        <option value="">Bitte auswählen...</option>
        <option>Jacken</option>
        <option>Hosen</option>
        <option>T-Shirts</option>
        <option>Schuhe</option>
        <option>Kinderkleidung</option>
      </select>
    </div>

    <!-- 🔥 Krisengebiet -->
    <div class="fade-in">
      <label for="krisengebiet">Krisengebiet</label>
      <select id="krisengebiet" class="form-select mb-4" required>
        <option value="">Bitte auswählen...</option>
        <option>Ukraine (Donezk)</option>
        <option>Syrien (Aleppo)</option>
        <option>Türkei (Erdbebengebiet)</option>
        <option>Sudan (Darfur)</option>
        <option>Äthiopien (Tigray)</option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary fade-in">
      <i class="bi bi-check-lg me-2"></i>
      Registrierung abschließen
    </button>

  </form>
</main>

<footer class="text-center mt-5 p-3 bg-light">
  <a href="impressum.html">Impressum</a> |
  <a href="datenschutz.html">Datenschutz</a>
  <p class="small text-muted mt-2">© 2026 Kleiderspenden Verein</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
