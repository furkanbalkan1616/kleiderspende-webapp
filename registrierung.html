<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kleiderspende registrieren</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="bg-dark text-white">
<div class="container d-flex justify-content-between align-items-center p-3">

<div class="d-flex align-items-center">
<img src="img/logo.png" width="50" class="me-2">
<h1 class="h4 m-0">Kleiderspenden Portal</h1>
</div>

<nav>
<a href="index.html" class="text-white me-3">Start</a>
<a href="registrierung.html" class="text-white">Registrierung</a>
</nav>

</div>
</header>

<main class="container mt-5">

<h2>Kleiderspende registrieren</h2>

<div class="card p-4 mt-4">

<form id="spendenForm">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-bag-heart"></i> Art der Kleidung
</label>

<select class="form-select" id="kleidung" required>

<option value="">Bitte auswählen</option>
<option>Jacken</option>
<option>Hosen</option>
<option>T-Shirts</option>
<option>Schuhe</option>
<option>Kinderkleidung</option>
<option>Decken / Schlafsäcke</option>

</select>

</div>


<div class="col-md-6 mb-3">

<label class="form-label">
<i class="bi bi-globe"></i> Krisengebiet
</label>

<select class="form-select" id="krisengebiet" required>

<option value="">Bitte auswählen</option>
<option>Ukraine</option>
<option>Syrien</option>
<option>Türkei</option>
<option>Afrika</option>

</select>

</div>

</div>


<div class="mb-3">

<label class="form-label">
<i class="bi bi-truck"></i> Übergabeart
</label>

<div class="form-check">

<input class="form-check-input" type="radio" name="uebergabe" id="geschaeftsstelle" value="Geschaeftsstelle" checked>

<label class="form-check-label">
Übergabe in der Geschäftsstelle
</label>

</div>

<div class="form-check">

<input class="form-check-input" type="radio" name="uebergabe" id="abholung" value="Abholung">

<label class="form-check-label">
Abholung durch Sammelfahrzeug
</label>

</div>

</div>


<div id="adresseBereich" style="display:none">

<h4><i class="bi bi-geo-alt"></i> Abholadresse</h4>

<div class="row">

<div class="col-md-4 mb-3">

<label class="form-label">Straße / Hausnummer</label>

<input type="text" class="form-control" id="strasse">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">Postleitzahl</label>

<input type="text" class="form-control" id="plz">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">Ort</label>

<input type="text" class="form-control" id="ort">

</div>

</div>

</div>

<button class="btn btn-primary mt-3" type="submit">
Registrierung abschließen
</button>

</form>

</div>

</main>

<footer class="text-center p-4 mt-5">

<a href="impressum.html">Impressum</a> |
<a href="datenschutz.html">Datenschutz</a>

<p class="mt-2">© 2026 Kleiderspenden Verein</p>

</footer>

<script src="js/app.js"></script>

</body>
</html>
