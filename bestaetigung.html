<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrierung bestätigt</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="bg-dark text-white">
  <div class="container d-flex justify-content-between align-items-center p-3">
    <a href="index.html" class="d-flex align-items-center text-white text-decoration-none">
      <img src="img/logo.png" width="50" class="me-2" alt="Logo">
      <h1 class="h4 m-0">Kleiderspenden Portal</h1>
    </a>

    <nav class="d-flex gap-3">
      <a href="index.html" class="text-white">Start</a>
      <a href="registrierung.html" class="text-white">Registrierung</a>
    </nav>
  </div>
</header>

<main class="container mt-5">

  <div class="text-center mb-4">
    <h2>Registrierung bestätigt</h2>
    <p class="text-muted">Ihre Kleiderspende wurde erfolgreich erfasst.</p>
  </div>

  <div class="alert alert-success">
    <i class="bi bi-check-circle"></i> Registrierung erfolgreich!
  </div>

  <!-- DATEN -->
  <div class="card p-4 mt-4 confirmation-card">

    <div class="confirmation-row">
      <span>Kleidung</span>
      <strong id="kleidung"></strong>
    </div>

    <div class="confirmation-row">
      <span>Krisengebiet</span>
      <strong id="krisengebiet"></strong>
    </div>

    <div class="confirmation-row">
      <span>Übergabeart</span>
      <strong id="uebergabe"></strong>
    </div>

    <div class="confirmation-row">
      <span>Straße</span>
      <strong id="strasse"></strong>
    </div>

    <div class="confirmation-row">
      <span>PLZ</span>
      <strong id="plz"></strong>
    </div>

    <div class="confirmation-row">
      <span>Ort</span>
      <strong id="ort"></strong>
    </div>

    <div class="confirmation-row">
      <span>Datum</span>
      <strong id="datum"></strong>
    </div>

    <div class="confirmation-row">
      <span>Uhrzeit</span>
      <strong id="uhrzeit"></strong>
    </div>

  </div>

  <!-- HINWEIS -->
  <div class="info-box mt-4">
    <p id="hinweistext"></p>
  </div>

  <!-- BUTTONS -->
  <div class="d-flex flex-column flex-md-row gap-2 mt-4">
    <a href="index.html" class="btn btn-primary">Startseite</a>
    <a href="registrierung.html" class="btn btn-outline-primary">Neue Spende</a>
  </div>

</main>

<footer class="text-center p-4 mt-5">
  <a href="impressum.html">Impressum</a> |
  <a href="datenschutz.html">Datenschutz</a>
  <p class="mt-2">© 2026 Kleiderspenden Verein</p>
</footer>

<script>
// ==========================
// DATEN HOLEN
// ==========================
const params = new URLSearchParams(window.location.search);

const data = {
  kleidung: params.get("kleidung") || "-",
  krisengebiet: params.get("krisengebiet") || "-",
  uebergabe: params.get("uebergabe") || "-",
  ort: params.get("ort") || "Geschäftsstelle Karlsruhe",
  strasse: params.get("strasse") || "-",
  plz: params.get("plz") || "-",
  datum: params.get("datum") || "-",
  uhrzeit: params.get("uhrzeit") || "-"
};

// ==========================
// DATEN EINSETZEN
// ==========================
Object.keys(data).forEach(key => {
  const el = document.getElementById(key);
  if (el) el.innerText = data[key];
});

// ==========================
// HINWEIS LOGIK (WICHTIG)
// ==========================
const hinweis = document.getElementById("hinweistext");

if (data.uebergabe === "Abholung") {
  hinweis.innerText =
    "Ihre Abholanfrage wurde registriert. Die Geschäftsstelle wird sich zeitnah bei Ihnen melden.";
} else {
  hinweis.innerText =
    "Bitte bringen Sie Ihre Spende während der Öffnungszeiten zur Geschäftsstelle Karlsruhe.";
}
</script>

</body>
</html>
