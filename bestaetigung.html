<script>
document.addEventListener("DOMContentLoaded", () => {

  const datenBox = document.getElementById("datenBox");
  const hinweis = document.getElementById("hinweistext");

  let daten = null;

  try {
    const gespeicherteDaten = localStorage.getItem("spendenDaten");
    daten = gespeicherteDaten ? JSON.parse(gespeicherteDaten) : null;
  } catch (e) {
    console.error("Fehler beim Laden der Daten:", e);
  }

  // ❌ Keine Daten vorhanden
  if (!daten) {
    datenBox.innerHTML = `
      <p class="text-center mb-0">
        Keine Daten vorhanden.<br>
        Bitte registrieren Sie eine neue Spende.
      </p>
    `;
    hinweis.textContent = "";
    return;
  }

  // 👉 Datum / Uhrzeit
  let datum = "-";
  let uhrzeit = "-";

  if (daten.datum) {
    const d = new Date(daten.datum);
    datum = d.toLocaleDateString("de-DE");
    uhrzeit = d.toLocaleTimeString("de-DE", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  const ausgabe = {
    kleidung: daten.kleidung || "-",
    krisengebiet: daten.krisengebiet || "-",
    uebergabe: daten.uebergabe || "-",
    strasse: daten.strasse || "-",
    plz: daten.plz || "-",
    ort: daten.ort || "-",
    datum: datum,
    uhrzeit: uhrzeit
  };

  // 🔥 SICHERES SETZEN (kein Crash mehr)
  Object.entries(ausgabe).forEach(([key, value]) => {
    const el = document.getElementById(key);
    if (el) {
      el.textContent = value;
    }
  });

  // 🔥 LOGIK FIXED
  if (daten.uebergabe === "Abholung") {
    hinweis.textContent =
      "Ihre Abholanfrage wurde registriert. Wir melden uns zeitnah bei Ihnen.";
  } else if (daten.uebergabe === "Geschaeftsstelle") {
    hinweis.textContent =
      "Bitte bringen Sie Ihre Spende während der Öffnungszeiten zur Geschäftsstelle.";

    // 👉 Adresse überschreiben (sicher)
    const strasseEl = document.getElementById("strasse");
    const plzEl = document.getElementById("plz");
    const ortEl = document.getElementById("ort");

    if (strasseEl) strasseEl.textContent = "-";
    if (plzEl) plzEl.textContent = "-";
    if (ortEl) ortEl.textContent = "Geschäftsstelle Karlsruhe";
  }

});
</script>
