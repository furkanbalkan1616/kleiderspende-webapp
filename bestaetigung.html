<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestätigung</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="bg-dark text-white p-3 text-center">
  <h1>Kleiderspenden Portal</h1>
</header>

<main class="container mt-5">

  <h2 class="mb-4 text-center">Ihre Spende wurde registriert ✅</h2>

  <!-- 🔥 INFO -->
  <div id="hinweistext" class="alert alert-info text-center mb-4"></div>

  <!-- 🔥 DATEN -->
  <div id="datenBox" class="card p-4 shadow">

    <div class="confirmation-row">
      <strong>Kleidung:</strong>
      <span id="kleidung"></span>
    </div>

    <div class="confirmation-row">
      <strong>Krisengebiet:</strong>
      <span id="krisengebiet"></span>
    </div>

    <div class="confirmation-row">
      <strong>Übergabeart:</strong>
      <span id="uebergabe"></span>
    </div>

    <div class="confirmation-row">
      <strong>Straße:</strong>
      <span id="strasse"></span>
    </div>

    <div class="confirmation-row">
      <strong>PLZ:</strong>
      <span id="plz"></span>
    </div>

    <div class="confirmation-row">
      <strong>Ort:</strong>
      <span id="ort"></span>
    </div>

    <div class="confirmation-row">
      <strong>Datum:</strong>
      <span id="datum"></span>
    </div>

    <div class="confirmation-row">
      <strong>Uhrzeit:</strong>
      <span id="uhrzeit"></span>
    </div>

  </div>

  <div class="text-center mt-4">
    <a href="index.html" class="btn btn-primary">Zur Startseite</a>
  </div>

</main>

<footer class="text-center mt-5 p-3 bg-light">
  <p class="small text-muted">© 2026 Kleiderspenden Verein</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
