<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bestätigung Ihrer Kleiderspende</title>
  <meta name="description" content="Bestätigung Ihrer Kleiderspende. Übersicht aller eingegebenen Daten.">

  <!-- Bootstrap -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Eigenes CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER (konsistent mit anderen Seiten) -->
<header class="bg-dark text-white">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center p-3">

    <a href="index.html" class="d-flex align-items-center text-white text-decoration-none">
      <img src="img/logo.png"
           alt="Logo Kleiderspenden Portal"
           width="50"
           class="me-2">
      <h1 class="m-0 fs-4">Kleiderspenden Portal</h1>
    </a>

    <nav aria-label="Hauptnavigation">
      <a href="index.html" class="text-white fw-bold">Start</a>
    </nav>

  </div>
</header>

<!-- MAIN -->
<main class="container mt-5 mb-5">

  <h2 class="text-center mb-4">
    <i class="bi bi-check-circle-fill text-success me-2"></i>
    Ihre Spende wurde erfolgreich registriert
  </h2>

  <!-- Hinweis -->
  <div id="hinweistext"
       class="alert alert-info text-center mb-4 shadow-sm"
       role="status"
       aria-live="polite"></div>

  <!-- Daten -->
  <section class="card p-4 shadow-lg confirmation-card" aria-labelledby="datenTitel">

    <h3 id="datenTitel" class="mb-4 text-center">Ihre Angaben</h3>

    <div class="confirmation-row">
      <strong><i class="bi bi-bag me-2"></i>Kleidung</strong>
      <span id="kleidung">-</span>
    </div>

    <div class="confirmation-row">
      <strong><i class="bi bi-globe me-2"></i>Krisengebiet</strong>
      <span id="krisengebiet">-</span>
    </div>

    <div class="confirmation-row">
      <strong><i class="bi bi-truck me-2"></i>Übergabeart</strong>
      <span id="uebergabe">-</span>
    </div>

    <hr>

    <div class="confirmation-row">
      <strong><i class="bi bi-geo-alt me-2"></i>Straße</strong>
      <span id="strasse">-</span>
    </div>

    <div class="confirmation-row">
      <strong><i class="bi bi-mailbox me-2"></i>PLZ</strong>
      <span id="plz">-</span>
    </div>

    <div class="confirmation-row">
      <strong><i class="bi bi-building me-2"></i>Ort</strong>
      <span id="ort">-</span>
    </div>

    <hr>

    <div class="confirmation-row">
      <strong><i class="bi bi-calendar me-2"></i>Datum</strong>
      <span id="datum">-</span>
    </div>

    <div class="confirmation-row">
      <strong><i class="bi bi-clock me-2"></i>Uhrzeit</strong>
      <span id="uhrzeit">-</span>
    </div>

  </section>

  <!-- Buttons -->
  <div class="text-center mt-5 d-flex justify-content-center gap-3 flex-wrap">

    <a href="index.html" class="btn btn-primary px-4 py-2">
      <i class="bi bi-house me-2"></i>
      Zur Startseite
    </a>

    <a href="registrierung.html" class="btn btn-outline-secondary px-4 py-2">
      Neue Spende erfassen
    </a>

  </div>

</main>

<!-- FOOTER -->
<footer class="text-center mt-5 p-3 bg-light border-top">
  <a href="impressum.html">Impressum</a> |
  <a href="datenschutz.html">Datenschutz</a>
  <p class="small text-muted mt-2">© 2026 Kleiderspenden Verein</p>
</footer>

<script src="js/app.js"></script>

</body>
</html>
